<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Smooth pinkish-white gradient */
            background: linear-gradient(135deg, #ffffff 0%, #fce4ec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        .enter-button {
            display: inline-block;
            text-decoration: none;
            background-color: #f06292; /* Soft Pink */
            color: white;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(240, 98, 146, 0.3);
            border: 2px solid transparent;
        }

        .enter-button:hover {
            background-color: #ffffff;
            color: #f06292;
            border: 2px solid #f06292;
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(240, 98, 146, 0.4);
        }

        /* Subtle floating animation */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .enter-button {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <a href="page1.html" class="enter-button">Enter Here</a>

</body>
</html>
