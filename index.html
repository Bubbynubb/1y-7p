<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | My Site</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            /* Pinkish-white gradient */
            background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #4a4a4a;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px); /* Glass effect */
            box-shadow: 0 10px 30px rgba(255, 182, 193, 0.3);
            max-width: 400px;
            width: 90%;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 700;
            color: #d81b60; /* Deep pink for contrast */
        }

        p {
            font-weight: 300;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            background-color: #f06292; /* Soft Pink */
            color: white;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 500;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(240, 98, 146, 0.4);
        }

        .btn:hover {
            background-color: #ec407a;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 98, 146, 0.6);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <p>Step into my world. Click the button below to explore the first chapter of my project.</p>
        
        <a href="page1.html" class="btn">Explore Page 1</a>
    </div>

</body>
</html>

    <a href="page1.html" class="button">Go to Page 1</a>

</body>
</html>
