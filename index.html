<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        /* SMOOTH MOVEMENT CSS */
        #noBtn {
            transition: all 0.2s ease; /* This makes the "jump" look like a glide */
            position: relative; /* Starts in the center, moves when hovered */
            z-index: 15;
        }

        /* HEART STYLES */
        .heart {
            position: absolute;
            color: #ff4d6d; 
            user-select: none;
            pointer-events: none;
            z-index: 1; 
            animation: floatUp ease-in forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Do you love me, Holy?</h1>
    <div class="btn-container">
        <button id="noBtn" onclick="window.close()">No</button>
        <button id="yesBtn" onclick="location.href='page1.html'">Yes</button>
    </div>
</div>

<script>
    // 1. HEART GENERATOR
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const types = ['❤️', '💖', '💕', '💗', '🌸'];
        heart.innerHTML = types[Math.floor(Math.random() * types.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 300);

    // 2. SMOOTH RUNAWAY BUTTON LOGIC
    const noBtn = document.getElementById('noBtn');

    noBtn.addEventListener('mouseover', () => {
        // Calculate safe boundaries so it doesn't go off screen
        // padding of 50px keeps it away from the very edge
        const maxX = window.innerWidth - noBtn.offsetWidth - 50;
        const maxY = window.innerHeight - noBtn.offsetHeight - 50;

        const newX = Math.random() * maxX;
        const newY = Math.random() * maxY;

        noBtn.style.position = "fixed"; // Switches to fixed to move anywhere on screen
        noBtn.style.left = newX + "px";
        noBtn.style.top = newY + "px";
    });
</script>
    
</body>
</html>
