<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Adding the heart CSS here just in case it's missing from your file */
        .heart {
            position: absolute;
            color: #ff4d6d; 
            user-select: none;
            pointer-events: none;
            z-index: 1; 
            animation: floatUp ease-in forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>When did we first meet?</h1>

    <button id="noBtn" onclick="alert('Wrong! Try again! 😋')">Chipmong</button>
    <button id="yesBtn" onclick="location.href='page3.html'">Siem Reap</button>
</div>

<script>
    // 1. HEART GENERATOR
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const types = ['❤️', '💖', '💕', '💗', '🌸'];
        heart.innerHTML = types[Math.floor(Math.random() * types.length)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);
        setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 300);

    // 2. THE RUNAWAY BUTTON (Now it works because ID matches)
    const noBtn = document.getElementById('noBtn');
    noBtn.addEventListener('mouseover', () => {
        const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
        const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
        noBtn.style.position = "absolute";
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    });
</script>
    
</body>
</html>
