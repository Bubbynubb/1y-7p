<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message for Me | For Holy</title>
    <style>
        /* --- THEME FROM YOUR SCREENSHOT --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe5ec; /* Pink background from your image */
            font-family: 'Arial', sans-serif;
            overflow: hidden; 
        }

        .container {
            text-align: center;
            z-index: 10;
            background: rgba(255, 255, 255, 0.4); 
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            width: 85%;
            max-width: 450px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        h1 {
            color: #a3005c; /* Dark pink text */
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        /* --- TEXTBOX STYLES --- */
        .message-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border-radius: 12px;
            border: 2px solid #ffb3c1;
            background-color: #fff0f3;
            font-family: inherit;
            font-size: 16px;
            resize: none; 
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #ff4d6d;
            background-color: #ffffff;
        }

        /* --- BUTTON STYLES --- */
        #sendBtn {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            color: white;
            background-color: #ff99c8; /* Button color from your image */
            transition: all 0.3s ease;
        }

        #sendBtn:hover {
            transform: scale(1.05);
            background-color: #ff85a1;
        }

        /* --- HEART ANIMATION --- */
        .heart {
            position: absolute;
            color: #ff4d6d; 
            user-select: none;
            pointer-events: none;
            z-index: 1; 
            animation: floatUp ease-in forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>You made me so happy, Holy! 💕</h1>
        <p style="color: #a3005c; margin-bottom: 20px;">Leave me a note?</p>
        
        <div class="message-area">
            <textarea id="userMessage" placeholder="Type something sweet..."></textarea>
            <button type="button" id="sendBtn" onclick="fakeSend()">Send Message ❤️</button>
        </div>
    </div>

    <script>
        // 1. THE FAKE SEND LOGIC
        function fakeSend() {
            const btn = document.getElementById('sendBtn');
            const box = document.getElementById('userMessage');

            if (box.value.trim() === "") {
                alert("Please write something first! ✨");
                return;
            }

            // Visual feedback
            btn.innerText = "Sending... 💌";
            btn.style.opacity = "0.7";
            btn.style.pointerEvents = "none"; 

            // Wait a moment then go to page2.html
            setTimeout(() => {
                window.location.href = 'page2.html';
            }, 1500);
        }

        // 2. THE HEART GENERATOR
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const types = ['❤️', '💖', '💕', '💗', '🌸'];
            heart.innerHTML = types[Math.floor(Math.random() * types.length)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.top = "100vh";
            heart.style.fontSize = (Math.random() * 20 + 15) + "px";
            heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 300);
    </script>

</body>
</html>
