<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ensuring the heart animation is defined in case it's not in your style.css */
        .heart {
            position: absolute;
            color: #ff4d6d; 
            user-select: none;
            pointer-events: none;
            z-index: 1; 
            animation: floatUp ease-in forwards;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>What's the date of our first date?</h1>
  
    <button onclick="location.href='page4.html'">16/Feb</button>
    <button onclick="alert('Wrong date! Try again 😋')">17/Feb</button>
</div>

<script>
    // HEART GENERATOR
    function createHeart() {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        const types = ['❤️', '💖', '💕', '💗', '🌸'];
        heart.innerHTML = types[Math.floor(Math.random() * types.length)];
        
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (Math.random() * 20 + 15) + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        
        document.body.appendChild(heart);
        
        setTimeout(() => { 
            heart.remove(); 
        }, 6000);
    }
    
    setInterval(createHeart, 300);
</script>
    
</body>
</html>
